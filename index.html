<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday Zainab</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      overflow: hidden;
      text-align: center;
      color: #fff;
    }

    .container {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      padding: 20px;
      gap: 12px;
    }

    h1 {
      font-size: 2.2rem;
      margin: 0;
    }

    .glow {
      color: #fff;
      animation: glow 1.5s ease-in-out infinite alternate;
    }

    @keyframes glow {
      0% {
        text-shadow: 0 0 5px #fff, 0 0 10px #ff4da6, 0 0 20px #ff4da6;
      }
      100% {
        text-shadow: 0 0 10px #fff, 0 0 20px #ff99cc, 0 0 30px #ff1a75;
      }
    }

    p {
      font-size: 1rem;
      max-width: 420px;
    }

    .cake {
      position: relative;
      width: 180px;
      height: 160px;
      margin-top: 10px;
    }

    .layer {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      border-radius: 10px;
    }

    .layer.bottom {
      width: 180px;
      height: 60px;
      background: #ff6f91;
      bottom: 0;
    }

    .layer.middle {
      width: 140px;
      height: 50px;
      background: #ff9671;
      bottom: 60px;
    }

    .layer.top {
      width: 100px;
      height: 40px;
      background: #ffc75f;
      bottom: 110px;
    }

    .candle {
      position: absolute;
      width: 6px;
      height: 25px;
      background: white;
      bottom: 150px;
      border-radius: 3px;
    }

    .flame {
      position: absolute;
      width: 10px;
      height: 10px;
      background: orange;
      border-radius: 50%;
      top: -10px;
      left: 50%;
      transform: translateX(-50%);
      animation: flicker 0.2s infinite;
    }

    @keyframes flicker {
      0% { transform: translateX(-50%) scale(1); opacity: 1; }
      50% { transform: translateX(-50%) scale(1.2); opacity: 0.7; }
      100% { transform: translateX(-50%) scale(1); opacity: 1; }
    }

    .gifts {
      display: flex;
      gap: 10px;
      margin-top: 10px;
      font-size: 2rem;
      animation: float 2s infinite ease-in-out;
    }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0px); }
    }

    button {
      padding: 12px 18px;
      font-size: 1rem;
      border: none;
      border-radius: 25px;
      background: #fff;
      color: #ff6f91;
      cursor: pointer;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      pointer-events: none;
    }

    @media (max-width: 600px) {
      h1 { font-size: 1.8rem; }
      p { font-size: 0.95rem; }
    }
  </style>
</head>
<body>

<canvas id="confetti"></canvas>

<div class="container">
  <h1>🎉 Happy Birthday to my Pasandida Aurat <span class="glow">Zainab</span> 💖</h1>
  <p>Wishing you endless happiness, laughter, love, and beautiful surprises.</p>

  <div class="gifts">🎁 🎁 🎁 🎁</div>

  <div class="cake" id="cake">
    <div class="layer top"></div>
    <div class="layer middle"></div>
    <div class="layer bottom"></div>

    <div class="candle" style="left: 35px;"><div class="flame"></div></div>
    <div class="candle" style="left: 65px;"><div class="flame"></div></div>
    <div class="candle" style="left: 95px;"><div class="flame"></div></div>
    <div class="candle" style="left: 125px;"><div class="flame"></div></div>
  </div>

  <button onclick="startConfetti()">Celebrate 🎊</button>
  <button onclick="blowCandles()">Blow Candles 💨</button>
  <button onclick="relightCandles()">Relight 🔥</button>
</div>

<script>
const canvas = document.getElementById('confetti');
const ctx = canvas.getContext('2d');
let particles = [];

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

function createParticle() {
  return {
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height - canvas.height,
    size: Math.random() * 6 + 2,
    speed: Math.random() * 3 + 2,
    color: `hsl(${Math.random() * 360}, 100%, 50%)`
  };
}

function startConfetti() {
  particles = [];
  for (let i = 0; i < 150; i++) particles.push(createParticle());
  animate();
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles.forEach(p => {
    p.y += p.speed;
    if (p.y > canvas.height) {
      p.y = -10;
      p.x = Math.random() * canvas.width;
    }
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x, p.y, p.size, p.size);
  });
  requestAnimationFrame(animate);
}

function blowCandles() {
  document.querySelectorAll('.flame').forEach(f => f.style.display = 'none');
}

function relightCandles() {
  document.querySelectorAll('.flame').forEach(f => f.style.display = 'block');
}
</script>

</body>
</html>
